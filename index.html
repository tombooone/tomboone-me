<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tom Boone</title>
  <style>
    :root{
      --bg:#111;
    --text:#eee;
          --text-dim:#999;
    --accent:#c2601f;
      }
  *{box-sizing:border-box;}
  body{
        margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:2rem;
    text-align:center;
}
  h1{
        font-size:28px;
    font-weight:600;
    margin:0 0 8px;
}
  p{
        color:var(--text-dim);
    font-size:16px;
    margin:0 0 2rem;
    max-width:420px;
}
  .tools{
        display:flex;
    flex-direction:column;
    gap:10px;
    width:100%;
    max-width:320px;
  }
  a.tool{
    display:block;
    padding:14px 18px;
    border:1px solid #333;
    border-radius:10px;
    color:var(--text);
    text-decoration:none;
    font-size:15px;
    transition:border-color 0.15s;
  }
  a.tool:hover{
        border-color:var(--accent);
}
</style>
    </head>
    <body>

    <h1>Tom Boone</h1>
    <p>Tools and things I've built.</p>

    <div class="tools">
      <a class="tool" href="/night-log/">Night log — bedtime sleep tracker</a>
</div>

</body>
</html>
